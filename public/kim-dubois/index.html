  <!-- Anti-FOUC : on garde l'app masquée tant que les feuilles de style locales
       ne sont pas appliquées (évite l'éclair de contenu non stylé au chargement). -->
  <style>
    html.kd-loading #root { visibility: hidden; }
    /* Filets critiques : même pendant le chargement, l'entête n'est jamais cassée. */
    .shelf { max-height: 0; overflow: hidden; visibility: hidden; }
    .header-inner { display: flex; align-items: center; gap: 16px; }
    .nav-primary { display: flex; gap: 17px; align-items: center; }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    body { margin: 0; overflow-x: clip; }
  </style>
  <script>
    (function () {
      var h = document.documentElement;
      h.classList.add("kd-loading");
      function reveal() { h.classList.remove("kd-loading"); }
      function ready() {
        var links = [].slice.call(document.querySelectorAll('link[rel="stylesheet"][href^="assets/"]'));
        var ok = links.length > 0 && links.every(function (l) {
          try { return l.sheet && l.sheet.cssRules.length > 0; } catch (e) { return true; }
        });
        if (ok) reveal(); else setTimeout(ready, 40);
      }
      if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", ready);
      else ready();
      setTimeout(reveal, 2500); // garde-fou : on révèle quoi qu'il arrive
    })();
  </script>
</head>
<body>
  <div id="root"></div>

  <script>
    /* Silence le bruit d'extensions navigateur (MetaMask, etc.) — n'affecte pas la maquette */
    window.addEventListener("unhandledrejection", function (e) {
      var s = String((e.reason && (e.reason.stack || e.reason.message)) || e.reason || "");
      if (s.indexOf("MetaMask") !== -1 || s.indexOf("chrome-extension") !== -1) e.preventDefault();
    });
  </script>
