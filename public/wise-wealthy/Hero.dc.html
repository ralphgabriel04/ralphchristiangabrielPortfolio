<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative;width:{{ wpx }};height:{{ hpx }};flex:none;">
  <!-- hair behind (long) -->
  <sc-if value="{{ isLong }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;left:50%;top:8%;transform:translateX(-50%);width:68%;height:62%;border-radius:46% 46% 40% 40%;background:{{ hair }};"></div>
  </sc-if>
  <!-- body / shirt -->
  <div style="position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:76%;height:40%;border-radius:46% 46% 24% 24%;background:{{ shirt }};box-shadow:inset 0 -6px 0 rgba(0,0,0,.07);"></div>
  <!-- collar -->
  <div style="position:absolute;left:50%;bottom:36%;transform:translateX(-50%);width:18%;height:7%;border-radius:0 0 50% 50%;background:{{ skin }};"></div>
  <!-- head -->
  <div style="position:absolute;left:50%;top:8%;transform:translateX(-50%);width:58%;height:52%;border-radius:50%;background:{{ skin }};box-shadow:inset -5px -4px 0 rgba(0,0,0,.06);"></div>
  <!-- ears -->
  <div style="position:absolute;left:19%;top:32%;width:9%;height:11%;border-radius:50%;background:{{ skin }};"></div>
  <div style="position:absolute;right:19%;top:32%;width:9%;height:11%;border-radius:50%;background:{{ skin }};"></div>
  <!-- hair cap -->
  <div style="position:absolute;left:50%;top:4%;transform:translateX(-50%);width:62%;height:24%;border-radius:50% 50% 46% 46%;background:{{ hair }};"></div>
  <sc-if value="{{ isBun }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;left:50%;top:-1%;transform:translateX(-50%);width:24%;height:20%;border-radius:50%;background:{{ hair }};"></div>
  </sc-if>
  <!-- eyes -->
  <div style="position:absolute;left:37%;top:33%;width:6.5%;height:8%;border-radius:50%;background:#3A2A22;"></div>
  <div style="position:absolute;right:37%;top:33%;width:6.5%;height:8%;border-radius:50%;background:#3A2A22;"></div>
  <!-- cheeks -->
  <div style="position:absolute;left:30%;top:42%;width:9%;height:5.5%;border-radius:50%;background:rgba(255,120,120,.4);"></div>
  <div style="position:absolute;right:30%;top:42%;width:9%;height:5.5%;border-radius:50%;background:rgba(255,120,120,.4);"></div>
  <!-- smile -->
  <div style="position:absolute;left:50%;top:45%;transform:translateX(-50%);width:17%;height:9%;border:2.5px solid #6B3F2A;border-top:none;border-radius:0 0 60px 60px;"></div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:140,&quot;height&quot;:170},&quot;skin&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#F1C9A5&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;hair&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#4A3526&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;hairStyle&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;short&quot;,&quot;long&quot;,&quot;bun&quot;],&quot;default&quot;:&quot;short&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;shirt&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#46C95F&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;size&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:120,&quot;min&quot;:40,&quot;max&quot;:300,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const p=this.props;
    const size = Number(p.size)||120;
    const style = p.hairStyle||'short';
    return {
      wpx: size+'px',
      hpx: Math.round(size*1.18)+'px',
      skin: p.skin || '#F1C9A5',
      hair: p.hair || '#4A3526',
      shirt: p.shirt || '#46C95F',
      isLong: style==='long',
      isBun: style==='bun',
    };
  }
}
</script>
</body>
</html>
