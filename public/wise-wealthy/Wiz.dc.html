<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="width:100%;display:flex;align-items:flex-end;justify-content:center;">
  <sc-if value="{{ isIdea }}" hint-placeholder-val="{{ true }}"><img src="assets/wiz/idea.png" alt="Wiz" style="width:100%;height:auto;display:block;object-fit:contain;"></sc-if>
  <sc-if value="{{ isWave }}" hint-placeholder-val="{{ false }}"><img src="assets/wiz/wave.png" alt="Wiz" style="width:100%;height:auto;display:block;object-fit:contain;"></sc-if>
  <sc-if value="{{ isHappy }}" hint-placeholder-val="{{ false }}"><img src="assets/wiz/happy.png" alt="Wiz" style="width:100%;height:auto;display:block;object-fit:contain;"></sc-if>
  <sc-if value="{{ isThinking }}" hint-placeholder-val="{{ false }}"><img src="assets/wiz/thinking.png" alt="Wiz" style="width:100%;height:auto;display:block;object-fit:contain;"></sc-if>
  <sc-if value="{{ isCelebrate }}" hint-placeholder-val="{{ false }}"><img src="assets/wiz/celebrate.png" alt="Wiz" style="width:100%;height:auto;display:block;object-fit:contain;"></sc-if>
  <sc-if value="{{ isSecure }}" hint-placeholder-val="{{ false }}"><img src="assets/wiz/secure.png" alt="Wiz" style="width:100%;height:auto;display:block;object-fit:contain;"></sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:160,&quot;height&quot;:190},&quot;pose&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;idea&quot;,&quot;wave&quot;,&quot;happy&quot;,&quot;thinking&quot;,&quot;celebrate&quot;,&quot;secure&quot;],&quot;default&quot;:&quot;idea&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const valid = ['idea','wave','happy','thinking','celebrate','secure'];
    let pose = this.props.pose || 'idea';
    if (valid.indexOf(pose) < 0) pose = 'idea';
    return {
      isIdea: pose === 'idea',
      isWave: pose === 'wave',
      isHappy: pose === 'happy',
      isThinking: pose === 'thinking',
      isCelebrate: pose === 'celebrate',
      isSecure: pose === 'secure',
    };
  }
}
</script>
</body>
</html>
