<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">
</helmet>
<div style="position:relative;border-radius:18px;overflow:hidden;background:#141419;border:1px solid rgba(255,255,255,0.07);cursor:pointer;transition:transform .15s ease, border-color .2s ease;font-family:Poppins,system-ui,sans-serif" style-hover="border-color:rgba(255,255,255,0.16)" style-active="transform:scale(0.985)" onClick="{{ place.onOpen }}">
  <div style="position:relative;height:118px;background:{{ place.grad }}">
    <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 35%,rgba(10,10,12,0.82) 100%)"></div>
    <div style="position:absolute;top:10px;left:11px;display:flex;gap:6px;align-items:center">
      <sc-if value="{{ place.open }}" hint-placeholder-val="{{ true }}">
        <span style="display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:999px;background:rgba(10,12,10,0.62);backdrop-filter:blur(8px);font-size:10.5px;font-weight:600;color:#22E06F;letter-spacing:.2px"><span style="width:6px;height:6px;border-radius:50%;background:#22E06F;box-shadow:0 0 8px #22E06F"></span>Ouvert</span>
      </sc-if>
      <sc-if value="{{ place.secret }}" hint-placeholder-val="{{ false }}">
        <span style="padding:4px 9px;border-radius:999px;background:rgba(122,92,255,0.22);border:1px solid rgba(122,92,255,0.45);backdrop-filter:blur(8px);font-size:10.5px;font-weight:600;color:#c7b8ff;letter-spacing:.3px">Caché</span>
      </sc-if>
    </div>
    <button style="position:absolute;top:9px;right:9px;width:34px;height:34px;border:none;border-radius:50%;background:rgba(10,10,12,0.55);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s ease" style-active="transform:scale(0.82)" onClick="{{ place.onFav }}">
      <sc-if value="{{ place.fav }}" hint-placeholder-val="{{ false }}">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="var(--accent,#7A5CFF)"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      </sc-if>
      <sc-if value="{{ place.notFav }}" hint-placeholder-val="{{ true }}">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.9" stroke-linejoin="round"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      </sc-if>
    </button>
    <div style="position:absolute;bottom:9px;left:11px;font-size:10.5px;font-weight:500;color:rgba(255,255,255,0.72);letter-spacing:.2px">{{ place.type }}</div>
    <sc-if value="{{ place.match }}" hint-placeholder-val="{{ true }}">
      <div style="position:absolute;bottom:9px;right:11px;display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:999px;background:rgba(122,92,255,0.9);box-shadow:0 4px 14px -4px rgba(122,92,255,0.9);font-size:11px;font-weight:700;color:#fff;letter-spacing:.2px"><span style="width:6px;height:6px;border-radius:50%;background:#fff"></span>{{ place.match }}% match</div>
    </sc-if>
  </div>
  <div style="padding:11px 13px 13px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
      <div style="font-family:Montserrat,sans-serif;font-weight:600;font-size:14.5px;color:#fff;line-height:1.2">{{ place.name }}</div>
      <div style="display:flex;align-items:center;gap:3px;flex:none">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="#FFC24B"><path d="M12 2l2.9 6.3 6.9.8-5.1 4.6 1.4 6.8L12 17.8 5.9 20.5l1.4-6.8L2.2 9.1l6.9-.8z"/></svg>
        <span style="font-size:12.5px;font-weight:600;color:#fff">{{ place.rating }}</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;margin-top:5px;font-size:11.5px;color:rgba(255,255,255,0.5)">
      <span>{{ place.hood }}</span>
      <span style="width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,0.3)"></span>
      <sc-if value="{{ place.walk }}" hint-placeholder-val="{{ true }}"><span style="display:inline-flex;align-items:center;gap:3px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="4.5" r="2"/><path d="M9 21l1.5-6L8 12V8l4-1 2 3 3 1"/></svg>{{ place.walk }}</span></sc-if>
      <sc-if value="{{ place.noWalk }}" hint-placeholder-val="{{ false }}"><span>{{ place.dist }}</span></sc-if>
      <span style="width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,0.3)"></span>
      <span style="font-weight:600;color:rgba(255,255,255,0.62)">{{ place.budget }}</span>
    </div>
    <sc-if value="{{ place.why }}" hint-placeholder-val="{{ true }}">
      <div style="display:flex;align-items:center;gap:6px;margin-top:9px;font-size:11px;color:var(--accent,#7A5CFF);font-weight:500"><svg width="12" height="12" viewBox="0 0 24 24" fill="var(--accent,#7A5CFF)"><path d="M12 2l2 6 6 .4-4.7 3.8 1.6 5.8L12 14.8 7.1 18l1.6-5.8L4 8.4 10 8z"/></svg><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{ place.why }}</span></div>
    </sc-if>
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:10px">
      <sc-for list="{{ place.moodTags }}" as="tag" hint-placeholder-count="2">
        <span style="padding:3px 8px;border-radius:7px;background:rgba(255,255,255,0.06);font-size:10.5px;font-weight:500;color:rgba(255,255,255,0.72)">{{ tag }}</span>
      </sc-for>
      <sc-if value="{{ place.social }}" hint-placeholder-val="{{ false }}">
        <span style="padding:3px 8px;border-radius:7px;background:rgba(34,224,111,0.1);font-size:10.5px;font-weight:600;color:#22E06F">{{ place.social }} valident</span>
      </sc-if>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:340,&quot;height&quot;:210},&quot;place&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;}}"></script>
</body>
</html>
